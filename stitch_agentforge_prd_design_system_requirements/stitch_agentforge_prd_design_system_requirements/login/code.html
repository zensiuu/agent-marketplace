<style>
        .grid-pattern {
            background-image: linear-gradient(rgba(109, 221, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(109, 221, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .ethereal-glow {
            box-shadow: 0 0 40px rgba(109, 221, 255, 0.03);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 selection:text-primary min-h-screen flex flex-col">
<!-- Subtle Background Element -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute inset-0 grid-pattern"></div>
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-secondary/10 blur-[100px] rounded-full"></div>
</div>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center p-6 relative z-10">
<div class="w-full max-w-lg">
<!-- Logo / Brand Header -->
<div class="mb-12 text-center">
<h2 class="font-brand text-2xl font-bold tracking-[0.3em] text-primary">AGENTFORGE</h2>
</div>
<!-- Login Card -->
<div class="bg-white/5 backdrop-blur-xl border border-white/10 p-8 md:p-12 ethereal-glow rounded-xl">
<!-- Header -->
<header class="mb-10">
<h1 class="font-headline text-3xl font-black text-primary tracking-tight mb-3">INITIALIZE ACCESS</h1>
<p class="font-label text-on-surface-variant text-lg tracking-wide uppercase">Enter credentials to synchronize with your workspace.</p>
</header>
<!-- Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-sm uppercase tracking-[0.15em] text-on-surface-variant" for="email">Email Identity</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-xl transition-colors group-focus-within:text-primary">alternate_email</span>
<input class="w-full bg-surface-container-highest border-0 border-b border-outline-variant py-4 pl-12 pr-4 focus:ring-0 focus:border-primary transition-all font-body text-sm placeholder:text-outline/50" id="email" name="email" placeholder="user@nexus.io" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label text-sm uppercase tracking-[0.15em] text-on-surface-variant" for="password">Access Key</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-xl transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full bg-surface-container-highest border-0 border-b border-outline-variant py-4 pl-12 pr-4 focus:ring-0 focus:border-primary transition-all font-body text-sm placeholder:text-outline/50" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-3 cursor-pointer group">
<input class="w-5 h-5 rounded-sm bg-surface-container-highest border-outline-variant text-primary focus:ring-offset-background focus:ring-primary" type="checkbox"/>
<span class="font-label text-sm uppercase tracking-wider text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label text-sm uppercase tracking-wider text-secondary hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<!-- Action Button -->
<button class="w-full group relative flex items-center justify-center h-14 bg-gradient-to-r from-primary to-primary-dim text-on-primary font-headline text-sm font-bold tracking-[0.2em] transition-all active:scale-95" type="submit">
<span class="relative z-10">LOG IN</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow border-t border-white/5"></div>
<span class="px-4 font-label text-xs uppercase tracking-[0.3em] text-outline/50">External Auth</span>
<div class="flex-grow border-t border-white/5"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-12 bg-white/5 border border-white/10 hover:bg-white/10 transition-colors active:scale-95">
<img alt="Google" class="w-5 h-5 invert opacity-70" data-alt="minimalist white google logo icon on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAy_I0NHmHWskvMCIJdYuHuaYhrInBPS1PfmapxZyAjiDTTuwI3gLJtjS9zTGxja9jIHvZo18bJjUpvHXhOxwp5It3kdQCrf1es6eHKM5MWlRSQJuOXrdn58ERBe2VJrwX1Ayg_1ZTHIvoGAJ4wipSjaC0x8Kkj99kLGlLuTP1tNT71xE0puDDzCCRAN-RJfyG9D5oxKnFxLFZmKY26Z3lL1oWnuuIv2pbA1xPoOP9xgENhab5B-YYJfloUltoixvUa0WPonAZEZcDx"/>
<span class="font-label text-sm uppercase tracking-widest text-white/70">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-12 bg-white/5 border border-white/10 hover:bg-white/10 transition-colors active:scale-95">
<img alt="GitHub" class="w-5 h-5 invert opacity-70" data-alt="minimalist white github octocat logo icon on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDLgbXmAM3lMSLww901_xpbAFwWXBR_LpDBfZMF9YfY3oIs7-Zt_l1hVJ1G2dJ7LeoE1ik_CKfC_XzEy383rVGS3zKoe6S-uoQhAmZ7UIuFre3P_CxzzF0QMV2yHqnkymF1f25U62msvCGKLdLNG9LBG-Wzv66B9TUud2_9ArQY0snNQdrRyDHLax4vT_DtSq6Qhph36GyWsMVCbJzZxfes7wnXvQV8c24GSekyYuaCxG5UhUKn4yy7DPv447RXhsuYAr0xnr9V-JI"/>
<span class="font-label text-sm uppercase tracking-widest text-white/70">GitHub</span>
</button>
</div>
<!-- Footer -->
<footer class="mt-12 text-center">
<p class="font-label text-sm uppercase tracking-[0.1em] text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 ml-2" href="#">Sign up</a>
</p>
</footer>
</div>
</div>
</main>
<!-- Global Footer (Shared Component Guidance) -->
<footer class="w-full border-t border-white/5 bg-background">
<div class="max-w-7xl mx-auto px-8 py-12 flex flex-col md:flex-row justify-between items-center gap-6">
<div class="font-brand text-lg font-bold tracking-widest text-primary">AGENTFORGE</div>
<div class="flex flex-wrap justify-center gap-8">
<a class="font-label text-sm tracking-wide text-white/40 hover:text-secondary transition-colors uppercase" href="#">Marketplace</a>
<a class="font-label text-sm tracking-wide text-white/40 hover:text-secondary transition-colors uppercase" href="#">Templates</a>
<a class="font-label text-sm tracking-wide text-white/40 hover:text-secondary transition-colors uppercase" href="#">Skills</a>
<a class="font-label text-sm tracking-wide text-white/40 hover:text-secondary transition-colors uppercase" href="#">Docs</a>
</div>
<div class="font-label text-sm tracking-wide text-white/40 uppercase">© 2024 AGENTFORGE. ALL SYSTEMS OPERATIONAL</div>
</div>
</footer>
</body></html>
